[www]
user = www-data
group = www-data
listen = 127.0.0.1:9000
listen.owner = www-data
listen.group = www-data
pm = dynamic

; Tune these based on available RAM (e.g. for a 2GB VPS)
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 10

; Terminate a worker if it runs longer than 120s to prevent lockups
request_terminate_timeout = 120s

; Logging
catch_workers_output = yes
decorate_workers_output = no

; Slow log (Logs any script taking > 3s)
slowlog = /var/log/php8-fpm-slow.log
request_slowlog_timeout = 3s
